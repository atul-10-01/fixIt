# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm ci && npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Get build hash
        id: build_hash
        run: echo "hash=$(find dist -type f | sort | xargs sha256sum | sha256sum | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Cache last deployed hash
        id: cache
        uses: actions/cache@v4
        with:
          path: .deploy-hash
          key: deploy-hash-${{ steps.build_hash.outputs.hash }}

      - name: Pin firebase-tools to stable version
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm install -g firebase-tools@15.22.1

      - name: Deploy to Firebase Hosting
        if: steps.cache.outputs.cache-hit != 'true'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_FIXIT_500719 }}
          projectId: fixit-500719

      - name: Save deployed hash
        if: steps.cache.outputs.cache-hit != 'true'
        run: echo "${{ steps.build_hash.outputs.hash }}" > .deploy-hash
